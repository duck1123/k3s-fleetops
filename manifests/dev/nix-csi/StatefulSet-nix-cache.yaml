apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nix-cache
  namespace: nix-csi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cache
      app.kubernetes.io/part-of: nix-csi
  serviceName: nix-cache
  template:
    metadata:
      annotations:
        configHash: e75fe777d54ea6e7097e2591b0304ae4
        kubectl.kubernetes.io/default-container: nix-cache
        nix-csi/discard: "true"
      labels:
        app.kubernetes.io/name: cache
        app.kubernetes.io/part-of: nix-csi
    spec:
      containers:
        - command:
            - dinit
            - --log-file
            - /var/log/dinit.log
            - --quiet
            - cache
          env:
            - name: BUILDERS_ENABLED
              value: "true"
            - name: CACHE_ENABLED
              value: "true"
            - name: GC_KEEP_SECONDS
              value: "86400"
            - name: HOME
              value: /nix/var/nix-csi/root
            - name: IS_CACHE
              value: "true"
            - name: KUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: ghcr.io/lillecarl/nix-csi/scratch:1.0.1
          name: nix-cache
          ports:
            - containerPort: 22
              name: ssh
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - mountPath: /etc/nix
              name: nix-config
            - mountPath: /etc/nix-key
              name: nix-key
            - mountPath: /nix
              name: nix-store
              subPath: nix
            - mountPath: /etc/ssh
              name: ssh-config
            - mountPath: /etc/ssh-dynauth
              name: ssh-dynauth
            - mountPath: /etc/ssh-key
              name: ssh-key
      initContainers:
        - command:
            - initCopy
          image: ghcr.io/lillecarl/nix-csi/scratch:1.0.1
          imagePullPolicy: Always
          name: initcopy
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            capabilities:
              add:
                - SYS_CHROOT
          volumeMounts:
            - mountPath: /nix
              name: init-store
              subPath: nix
            - mountPath: /etc/nix
              name: nix-config
            - mountPath: /nix-volume
              name: nix-store
            - mountPath: /etc/ssh
              name: ssh-config
            - mountPath: /etc/ssh-dynauth
              name: ssh-dynauth
            - mountPath: /etc/ssh-key
              name: ssh-key
      priorityClassName: system-cluster-critical
      serviceAccountName: nix-csi
      volumes:
        - csi:
            driver: nix.csi.store
            readOnly: true
            volumeAttributes:
              aarch64-linux: /nix/store/75ls9nq7qdbbfvxfbrhi5ss1sxrnc4n8-cache-init-env
              x86_64-linux: /nix/store/vmvrahaqwzmzbl22p7m265gqn20qz8x5-cache-init-env
          name: init-store
        - configMap:
            name: nix-cache
          name: nix-config
        - name: nix-key
          secret:
            secretName: nix-key
        - configMap:
            defaultMode: 292
            name: ssh-config
          name: ssh-config
        - configMap:
            defaultMode: 292
            name: ssh-dynauth
          name: ssh-dynauth
        - name: ssh-key
          secret:
            defaultMode: 256
            secretName: ssh-key
  volumeClaimTemplates:
    - metadata:
        name: nix-store
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
