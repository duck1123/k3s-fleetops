apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nix-csi
  namespace: nix-csi
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - create
      - patch
      - delete
