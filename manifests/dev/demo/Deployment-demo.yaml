apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo
    spec:
      containers:
        - command:
            - /nix/bin/python3
            - /scripts/server.py
          env:
            - name: PORT
              value: "8080"
            - name: JSON_DATA_FILE
              value: /data/data.json
          image: ghcr.io/lillecarl/nix-csi/scratch:1.0.1
          name: demo
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /nix
              name: nix
            - mountPath: /scripts
              name: scripts
            - mountPath: /data
              name: data
      initContainers:
        - command:
            - sh
            - -c
            - |
              echo "=== /nix top-level ===" && ls -la /nix &&
              echo "=== /nix/bin ===" && ls -la /nix/bin 2>/dev/null || echo "(no /nix/bin)" &&
              echo "=== /nix/nix ===" && ls -la /nix/nix 2>/dev/null || echo "(no /nix/nix)" &&
              echo "=== /nix/nix/var ===" && ls -la /nix/nix/var 2>/dev/null || echo "(no /nix/nix/var)" &&
              echo "=== /nix/nix/var/result ===" && ls -la /nix/nix/var/result 2>/dev/null || echo "(no /nix/nix/var/result)" &&
              echo "=== /nix/nix/store ===" && ls /nix/nix/store 2>/dev/null | head -20 || echo "(no /nix/nix/store)" &&
              echo "=== all files 3 levels deep ===" && find /nix -maxdepth 3 2>/dev/null
          image: busybox:1.36
          name: nix-debug
          volumeMounts:
            - mountPath: /nix
              name: nix
      volumes:
        - csi:
            driver: nix.csi.store
            volumeAttributes:
              nixExpr: |
                let
                  pkgs = import (builtins.fetchTree {
                    type = "github";
                    owner = "nixos";
                    repo = "nixpkgs";
                    ref = "nixos-unstable";
                  }) {};
                in
                pkgs.python3
          name: nix
        - configMap:
            name: demo-server
          name: scripts
        - configMap:
            name: demo-data
          name: data
