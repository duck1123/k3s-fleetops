apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo
    spec:
      containers:
        - command:
            - python3
            - /scripts/server.py
          env:
            - name: PORT
              value: "8080"
            - name: JSON_DATA_FILE
              value: /data/data.json
          image: ghcr.io/lillecarl/nix-csi/scratch:1.0.1
          name: demo
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /
              name: nix
            - mountPath: /scripts
              name: scripts
            - mountPath: /data
              name: data
      initContainers:
        - command:
            - sh
            - -c
            - |
              echo "=== / top-level ===" ; ls -la / ;
              echo "=== /bin ===" ; ls -la /bin 2>/dev/null || echo "(no /bin)" ;
              echo "=== /nix ===" ; ls -la /nix 2>/dev/null || echo "(no /nix)" ;
              echo "=== /nix/var ===" ; ls -la /nix/var 2>/dev/null || echo "(no /nix/var)" ;
              echo "=== /nix/var/result (symlink) ===" ; ls -la /nix/var/result 2>/dev/null || echo "(no /nix/var/result)" ;
              echo "=== /nix/var/result/bin ===" ; ls /nix/var/result/bin 2>/dev/null || echo "(no /nix/var/result/bin)" ;
              echo "=== /nix/store (first 10) ===" ; ls /nix/store 2>/dev/null | head -10 || echo "(no /nix/store)"
          image: busybox:1.36
          name: nix-debug
          volumeMounts:
            - mountPath: /
              name: nix
      volumes:
        - csi:
            driver: nix.csi.store
            volumeAttributes:
              nixExpr: |
                let
                  pkgs = import (builtins.fetchTree {
                    type = "github";
                    owner = "nixos";
                    repo = "nixpkgs";
                    ref = "nixos-unstable";
                  }) {};
                in
                pkgs.python3
          name: nix
        - configMap:
            name: demo-server
          name: scripts
        - configMap:
            name: demo-data
          name: data
