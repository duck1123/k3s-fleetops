apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: listenarr
    app.kubernetes.io/name: listenarr
    app.kubernetes.io/version: latest
  name: listenarr
  namespace: listenarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: listenarr
      app.kubernetes.io/name: listenarr
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: listenarr
        app.kubernetes.io/name: listenarr
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: LISTENARR__POSTGRES__HOST
              value: postgresql.postgresql
            - name: LISTENARR__POSTGRES__PORT
              value: "5432"
            - name: LISTENARR__POSTGRES__MAINDB
              value: listenarr
            - name: LISTENARR__POSTGRES__LOGDB
              value: listenarr-log
            - name: LISTENARR__POSTGRES__USER
              value: listenarr
            - name: LISTENARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: listenarr-database-password
          image: ghcr.io/listenarrs/listenarr:canary
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 4545
            initialDelaySeconds: 90
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: listenarr
          ports:
            - containerPort: 4545
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 4545
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /downloads
              name: downloads
            - mountPath: /podcasts
              name: podcasts
      initContainers: []
      serviceAccountName: default
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: listenarr-listenarr-config
        - name: listenarr-database-password
          secret:
            secretName: listenarr-database-password
        - name: downloads
          persistentVolumeClaim:
            claimName: listenarr-listenarr-downloads
        - name: podcasts
          persistentVolumeClaim:
            claimName: listenarr-listenarr-podcasts
