apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: komga
  namespace: komga
spec:
  ingressClassName: tailscale
  rules:
    - host: komga.bearded-snake.ts.net
      http:
        paths:
          - backend:
              service:
                name: komga
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - komga.bearded-snake.ts.net
