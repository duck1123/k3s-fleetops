apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "5"
  labels:
    app: crds-operator
    app.kubernetes.io/component: crds-upgrade
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: crds-prometheus-operator
    app.kubernetes.io/part-of: crds
    app.kubernetes.io/version: 0.0.0
    chart: crds-0.0.0
    heritage: Helm
    release: prometheus
  name: prometheus-crds-upgrade
  namespace: prometheus
spec:
  backoffLimit: 3
  template:
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - apply
            - --server-side
            - --filename
            - /tmp/crds.yaml
          command:
            - kubectl
          image: registry.k8s.io/kubectl:v1.35.3
          imagePullPolicy: IfNotPresent
          name: kubectl
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp/
              name: tmp
      initContainers:
        - args:
            - -c
            - bzcat /crds/crds.bz2 > /tmp/crds.yaml
          command:
            - sh
          image: docker.io/busybox:latest
          imagePullPolicy: IfNotPresent
          name: busybox
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /crds/
              name: crds
            - mountPath: /tmp/
              name: tmp
          workingDir: /tmp/
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: prometheus-crds-upgrade
      volumes:
        - emptyDir: {}
          name: tmp
        - configMap:
            name: prometheus-crds-upgrade
          name: crds
