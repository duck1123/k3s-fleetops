apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: tunarr
    app.kubernetes.io/name: tunarr
    app.kubernetes.io/version: latest
  name: tunarr
  namespace: tunarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: tunarr
      app.kubernetes.io/name: tunarr
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: tunarr
        app.kubernetes.io/name: tunarr
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: TZ
              value: Etc/UTC
            - name: TUNARR_SERVER_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: info
          image: chrisbenincasa/tunarr:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: tunarr
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
            privileged: true
          volumeMounts:
            - mountPath: /config/tunarr
              name: config
            - mountPath: /tv
              name: tv
            - mountPath: /movies
              name: movies
            - mountPath: /dev/dri/renderD128
              name: dri
      nodeSelector:
        kubernetes.io/hostname: edgenix
      securityContext:
        runAsGroup: 0
        runAsUser: 0
        supplementalGroups:
          - 303
      serviceAccountName: default
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tunarr-tunarr-config
        - name: tv
          persistentVolumeClaim:
            claimName: tunarr-tunarr-tv
        - name: movies
          persistentVolumeClaim:
            claimName: tunarr-tunarr-movies
        - hostPath:
            path: /dev/dri/renderD129
            type: CharDevice
          name: dri
