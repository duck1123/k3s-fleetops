apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tunarr
  namespace: tunarr
spec:
  ingressClassName: tailscale
  rules:
    - host: tunarr.bearded-snake.ts.net
      http:
        paths:
          - backend:
              service:
                name: tunarr
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - tunarr.bearded-snake.ts.net
