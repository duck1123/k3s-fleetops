apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: sonarr
  namespace: sonarr
spec:
  ingressClassName: traefik
  rules:
    - host: sonarr.home.kronkltd.net
      http:
        paths:
          - backend:
              service:
                name: sonarr
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - sonarr.home.kronkltd.net
      secretName: sonarr.home.kronkltd.net-tls
