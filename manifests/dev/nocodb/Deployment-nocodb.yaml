apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: nocodb
    app.kubernetes.io/name: nocodb
    app.kubernetes.io/version: 0.301.4
  name: nocodb
  namespace: nocodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: nocodb
      app.kubernetes.io/name: nocodb
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nocodb
        app.kubernetes.io/name: nocodb
    spec:
      automountServiceAccountToken: true
      containers:
        - command:
            - /bin/sh
            - -c
            - |
              [ -f /work/NC_DB ] && export NC_DB=$(cat /work/NC_DB)
              [ -f /work/NC_REDIS_URL ] && export NC_REDIS_URL=$(cat /work/NC_REDIS_URL)
              exec /usr/src/appEntry/start.sh
          env:
            - name: PORT
              value: "8080"
            - name: NC_TOOL_DIR
              value: /usr/app/data
            - name: NC_DISABLE_TELE
              value: "true"
            - name: NC_ALLOW_LOCAL_EXTERNAL_DBS
              value: "true"
            - name: NC_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: NC_AUTH_JWT_SECRET
                  name: nocodb-jwt-secret
            - name: NC_PUBLIC_URL
              value: https://nocodb.bearded-snake.ts.net
            - name: NC_S3_BUCKET_NAME
              value: nocodb
            - name: NC_S3_REGION
              value: us-east-1
            - name: NC_S3_ENDPOINT
              value: http://rustfs.rustfs:9000
            - name: NC_S3_FORCE_PATH_STYLE
              value: "true"
            - name: NC_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: accessKey
                  name: nocodb-storage
            - name: NC_S3_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  key: secretKey
                  name: nocodb-storage
          image: nocodb/nocodb:0.301.5
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: nocodb
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /usr/app/data
              name: data
            - mountPath: /work
              name: nocodb-env-work
      initContainers:
        - command:
            - python3
            - -c
            - |
              import urllib.parse
              import os

              if os.path.exists("/secrets-db/password"):
                  with open("/secrets-db/password") as f:
                      pwd = f.read()
                  user = os.environ.get("PGUSER", "nocodb")
                  host = os.environ.get("PGHOST", "postgresql.postgresql")
                  port = os.environ.get("PGPORT", "5432")
                  db = os.environ.get("PGDATABASE", "nocodb")
                  enc = urllib.parse.quote(pwd, safe="")
                  nc_db = f"pg://{host}:{port}?u={user}&p={enc}&d={db}"
                  with open("/work/NC_DB", "w") as f:
                      f.write(nc_db)

              if os.path.exists("/secrets-redis/password"):
                  with open("/secrets-redis/password") as f:
                      pwd = f.read()
                  host = os.environ.get("REDIS_HOST", "redis.redis")
                  port = os.environ.get("REDIS_PORT", "6379")
                  enc = urllib.parse.quote(pwd, safe="")
                  url = f"redis://:{enc}@{host}:{port}/0"
                  with open("/work/NC_REDIS_URL", "w") as f:
                      f.write(url)
          env:
            - name: PGUSER
              value: nocodb
            - name: PGHOST
              value: postgresql.postgresql
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: nocodb
            - name: REDIS_HOST
              value: redis.redis
            - name: REDIS_PORT
              value: "6379"
          image: python:3-alpine
          imagePullPolicy: IfNotPresent
          name: build-connection-urls
          volumeMounts:
            - mountPath: /work
              name: nocodb-env-work
            - mountPath: /secrets-db
              name: db-secret
            - mountPath: /secrets-redis
              name: redis-secret
      serviceAccountName: default
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nocodb-data
        - emptyDir: {}
          name: nocodb-env-work
        - name: db-secret
          secret:
            secretName: nocodb-database
        - name: redis-secret
          secret:
            secretName: nocodb-redis-url
