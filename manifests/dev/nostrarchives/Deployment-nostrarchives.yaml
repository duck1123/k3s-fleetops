apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostrarchives
  namespace: nostrarchives
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: nostrarchives
      app.kubernetes.io/name: nostrarchives
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nostrarchives
        app.kubernetes.io/name: nostrarchives
    spec:
      containers:
        - command:
            - nostr-api
          env:
            - name: LISTEN_ADDR
              value: 0.0.0.0:8000
            - name: WS_LISTEN_ADDR
              value: 0.0.0.0:8001
            - name: SCHEDULER_WS_LISTEN_ADDR
              value: 0.0.0.0:8002
            - name: INDEXER_WS_LISTEN_ADDR
              value: 0.0.0.0:8003
            - name: SSL_CERT_FILE
              value: /nix/var/result/etc/ssl/certs/ca-bundle.crt
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: nostrarchives-db
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: REDIS_URL
                  name: nostrarchives-redis
          image: ghcr.io/lillecarl/nix-csi/scratch:1.0.1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 5
          name: nostrarchives
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 8001
              name: ws-search
              protocol: TCP
            - containerPort: 8002
              name: ws-scheduler
              protocol: TCP
            - containerPort: 8003
              name: ws-indexer
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /nix
              name: nix
              subPath: nix
      volumes:
        - csi:
            driver: nix.csi.store
            volumeAttributes:
              nixExpr: |
                let
                  pkgs = import (builtins.fetchTree {
                    type = "github";
                    owner = "nixos";
                    repo = "nixpkgs";
                    ref = "nixos-unstable";
                  }) {};
                  src = builtins.fetchTree {
                    type = "github";
                    owner = "barrydeen";
                    repo = "nostrarchives-api";
                    rev = "d616cdd09119bf3e1f1db50f8d7a823e7459dedf";
                  };
                  api = pkgs.rustPlatform.buildRustPackage {
                    pname = "nostrarchives-api";
                    version = "unstable";
                    inherit src;
                    cargoLock.lockFile = src + "/Cargo.lock";
                    nativeBuildInputs = [ pkgs.pkg-config ];
                    buildInputs = [ pkgs.openssl ];
                    env.OPENSSL_NO_VENDOR = "1";
                  };
                in
                pkgs.buildEnv {
                  name = "nostrarchives-api-bundle";
                  paths = [ api pkgs.cacert ];
                }
          name: nix
