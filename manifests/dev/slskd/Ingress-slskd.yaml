apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: slskd
  namespace: slskd
spec:
  ingressClassName: traefik
  rules:
    - host: slskd.home.kronkltd.net
      http:
        paths:
          - backend:
              service:
                name: slskd
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - slskd.home.kronkltd.net
      secretName: slskd.home.kronkltd.net-tls
