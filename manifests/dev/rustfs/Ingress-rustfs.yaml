apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: tailscale
  labels:
    app.kubernetes.io/instance: rustfs
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/version: 1.0.0-alpha.90
    helm.sh/chart: rustfs-0.0.90
  name: rustfs
  namespace: rustfs
spec:
  ingressClassName: tailscale
  rules:
    - host: rustfs.bearded-snake.ts.net
      http:
        paths:
          - backend:
              service:
                name: rustfs-svc
                port:
                  name: console
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - rustfs.bearded-snake.ts.net
      secretName: rustfs-tls
