apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs-local
  namespace: rustfs
spec:
  ingressClassName: traefik
  rules:
    - host: rustfs.local
      http:
        paths:
          - backend:
              service:
                name: rustfs
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls: []
