apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-immich-external-library-nfs
spec:
  accessModes:
    - ReadOnlyMany
  capacity:
    storage: 1Ti
  mountOptions:
    - nolock
    - soft
    - timeo=30
  nfs:
    path: /volume1/Photos
    server: 192.168.0.124
  persistentVolumeReclaimPolicy: Retain
