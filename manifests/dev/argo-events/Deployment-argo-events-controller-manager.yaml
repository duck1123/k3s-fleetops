apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/instance: argo-events
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: argo-events-controller-manager
    app.kubernetes.io/part-of: argo-events
    app.kubernetes.io/version: v1.9.10
    helm.sh/chart: argo-events-2.4.21
  name: argo-events-controller-manager
  namespace: argo-events
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/instance: argo-events
      app.kubernetes.io/name: argo-events-controller-manager
  template:
    metadata:
      annotations:
        checksum/config: ec3a71ec6a2ee00c49998d33695b7ddf2f97ec4f2810fa434f325027cd9f65fa
      labels:
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/instance: argo-events
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: argo-events-controller-manager
        app.kubernetes.io/part-of: argo-events
        app.kubernetes.io/version: v1.9.10
        helm.sh/chart: argo-events-2.4.21
    spec:
      containers:
        - args:
            - controller
          env:
            - name: ARGO_EVENTS_IMAGE
              value: quay.io/argoproj/argo-events:v1.9.10
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: quay.io/argoproj/argo-events:v1.9.10
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: controller-manager
          ports:
            - containerPort: 7777
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: probe
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: probe
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /etc/argo-events
              name: config
      serviceAccountName: argo-events-controller-manager
      volumes:
        - configMap:
            name: argo-events-controller-manager
          name: config
