apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: affine
  namespace: affine
spec:
  ingressClassName: tailscale
  rules:
    - host: affine.bearded-snake.ts.net
      http:
        paths:
          - backend:
              service:
                name: affine
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - affine.bearded-snake.ts.net
      secretName: affine-tls
