apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: affine-local
  namespace: affine
spec:
  ingressClassName: traefik
  rules:
    - host: affine.local
      http:
        paths:
          - backend:
              service:
                name: affine
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls: []
