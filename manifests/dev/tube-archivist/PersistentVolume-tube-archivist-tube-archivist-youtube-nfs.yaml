apiVersion: v1
kind: PersistentVolume
metadata:
  name: tube-archivist-tube-archivist-youtube-nfs
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 2Ti
  mountOptions:
    - nolock
    - soft
    - timeo=30
  nfs:
    path: /volume1/Youtube
    server: 192.168.0.124
  persistentVolumeReclaimPolicy: Retain
