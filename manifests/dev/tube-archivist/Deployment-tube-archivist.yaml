apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: tube-archivist
    app.kubernetes.io/name: tube-archivist
    app.kubernetes.io/version: latest
  name: tube-archivist
  namespace: tube-archivist
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: tube-archivist
      app.kubernetes.io/name: tube-archivist
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: tube-archivist
        app.kubernetes.io/name: tube-archivist
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: TA_HOST
              value: tube-archivist.bearded-snake.ts.net
            - name: ES_URL
              value: http://tube-archivist-es:9200
            - name: REDIS_HOST
              value: redis.redis
            - name: TA_USERNAME
              valueFrom:
                secretKeyRef:
                  key: username
                  name: tube-archivist-auth
            - name: TA_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: tube-archivist-auth
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: tube-archivist-elastic-password
          image: bbilly1/tubearchivist:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: tube-archivist
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /youtube
              name: youtube
            - mountPath: /cache
              name: cache
      nodeSelector:
        kubernetes.io/hostname: edgenix
      serviceAccountName: default
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tube-archivist-tube-archivist-config
        - name: youtube
          persistentVolumeClaim:
            claimName: tube-archivist-tube-archivist-youtube
        - name: cache
          persistentVolumeClaim:
            claimName: tube-archivist-tube-archivist-cache
