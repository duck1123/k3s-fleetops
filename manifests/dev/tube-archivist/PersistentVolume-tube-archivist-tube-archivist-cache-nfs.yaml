apiVersion: v1
kind: PersistentVolume
metadata:
  name: tube-archivist-tube-archivist-cache-nfs
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 500Gi
  mountOptions:
    - nolock
    - soft
    - timeo=30
  nfs:
    path: /volume1/YT-Cache
    server: 192.168.0.124
  persistentVolumeReclaimPolicy: Retain
