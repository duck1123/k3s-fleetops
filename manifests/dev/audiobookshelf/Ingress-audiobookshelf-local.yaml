apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf-local
  namespace: audiobookshelf
spec:
  ingressClassName: traefik
  rules:
    - host: audiobookshelf.local
      http:
        paths:
          - backend:
              service:
                name: audiobookshelf
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls: []
