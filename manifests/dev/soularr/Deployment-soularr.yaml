apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: soularr
    app.kubernetes.io/name: soularr
  name: soularr
  namespace: soularr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: soularr
      app.kubernetes.io/name: soularr
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: soularr
        app.kubernetes.io/name: soularr
    spec:
      containers:
        - command:
            - sh
            - -c
            - while true; do python soularr.py; sleep 300; done
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: SCRIPT_INTERVAL
              value: "300"
          image: mrusse08/soularr:latest
          imagePullPolicy: IfNotPresent
          name: soularr
          securityContext:
            runAsGroup: 1000
            runAsUser: 1000
          volumeMounts:
            - mountPath: /data
              name: config
            - mountPath: /downloads
              name: downloads
          workingDir: /app
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -e
              cat > /data/config.ini << 'SOULARR_CONFIG'
              [Lidarr]
              api_key = __LIDARR_API_KEY__
              host_url = __LIDARR_HOST_URL__
              download_dir = __LIDARR_DOWNLOAD_DIR__
              disable_sync = False

              [Slskd]
              api_key = __SLSKD_API_KEY__
              host_url = __SLSKD_HOST_URL__
              url_base = /
              download_dir = /downloads
              delete_searches = False
              stalled_timeout = 3600
              remote_queue_timeout = 300

              [Release Settings]
              use_most_common_tracknum = True
              allow_multi_disc = True
              accepted_countries = Europe,Japan,United Kingdom,United States,[Worldwide],Australia,Canada
              skip_region_check = False
              accepted_formats = CD,Digital Media,Vinyl

              [Search Settings]
              search_timeout = 5000
              maximum_peer_queue = 50
              minimum_peer_upload_speed = 0
              minimum_filename_match_ratio = 0.8
              allowed_filetypes = flac 24/192,flac 16/44.1,flac,mp3 320,mp3
              ignored_users = User1,User2,Fred,Bob
              search_for_tracks = True
              album_prepend_artist = False
              track_prepend_artist = True
              search_type = incrementing_page
              number_of_albums_to_grab = 10
              remove_wanted_on_failure = False
              title_blacklist = BlacklistWord1,blacklistword2
              search_blacklist = WordToStripFromSearch1,WordToStripFromSearch2
              search_source = missing
              enable_search_denylist = False
              max_search_failures = 3

              [Download Settings]
              download_filtering = True
              use_extension_whitelist = False
              extensions_whitelist = lrc,nfo,txt

              [Logging]
              level = INFO
              format = [%(levelname)s|%(module)s|L%(lineno)d] %(asctime)s: %(message)s
              datefmt = %Y-%m-%dT%H:%M:%S%z
              SOULARR_CONFIG
              sed -i "s|__LIDARR_API_KEY__|$LIDARR_API_KEY|g" /data/config.ini
              sed -i "s|__LIDARR_HOST_URL__|$LIDARR_HOST_URL|g" /data/config.ini
              sed -i "s|__LIDARR_DOWNLOAD_DIR__|$LIDARR_DOWNLOAD_DIR|g" /data/config.ini
              sed -i "s|__SLSKD_API_KEY__|$SLSKD_API_KEY|g" /data/config.ini
              sed -i "s|__SLSKD_HOST_URL__|$SLSKD_HOST_URL|g" /data/config.ini
              chown -R ${PUID}:${PGID} /data
          env:
            - name: LIDARR_HOST_URL
              value: http://lidarr.lidarr:8686
            - name: LIDARR_DOWNLOAD_DIR
              value: /downloads/slskd_downloads
            - name: SLSKD_HOST_URL
              value: http://slskd.slskd:5030
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: LIDARR_API_KEY
              valueFrom:
                secretKeyRef:
                  key: api_key
                  name: soularr-lidarr-api-key
            - name: SLSKD_API_KEY
              valueFrom:
                secretKeyRef:
                  key: api_key
                  name: soularr-slskd-api-key
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          name: write-config
          volumeMounts:
            - mountPath: /data
              name: config
      nodeSelector:
        kubernetes.io/hostname: edgenix
      securityContext:
        fsGroup: 1000
      serviceAccountName: default
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: soularr-soularr-config
        - name: downloads
          persistentVolumeClaim:
            claimName: soularr-soularr-downloads
