apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie-local
  namespace: mealie
spec:
  ingressClassName: traefik
  rules:
    - host: mealie.local
      http:
        paths:
          - backend:
              service:
                name: mealie
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls: []
