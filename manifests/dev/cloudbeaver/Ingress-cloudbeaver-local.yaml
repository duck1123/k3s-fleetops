apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudbeaver-local
  namespace: cloudbeaver
spec:
  ingressClassName: traefik
  rules:
    - host: cloudbeaver.local
      http:
        paths:
          - backend:
              service:
                name: cloudbeaver
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls: []
