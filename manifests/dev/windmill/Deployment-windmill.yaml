apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: windmill
    app.kubernetes.io/name: windmill
    app.kubernetes.io/version: latest
  name: windmill
  namespace: windmill
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: windmill
      app.kubernetes.io/name: windmill
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: windmill
        app.kubernetes.io/name: windmill
    spec:
      automountServiceAccountToken: true
      containers:
        - command:
            - /bin/sh
            - -c
            - export DATABASE_URL=$(cat /work/database_url) && exec windmill standalone
          env:
            - name: TZ
              value: Etc/UTC
            - name: MODE
              value: standalone
            - name: BASE_URL
              value: https://windmill.bearded-snake.ts.net
          image: ghcr.io/windmill-labs/windmill-full:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: windmill
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /work
              name: windmill-db-url-work
      initContainers:
        - command:
            - python3
            - -c
            - |
              import urllib.parse
              import os
              user = os.environ["PGUSER"]
              password = os.environ["PGPASSWORD"]
              host = os.environ["PGHOST"]
              port = os.environ["PGPORT"]
              db = os.environ["PGDATABASE"]
              enc = urllib.parse.quote(password, safe="")
              url = f"postgresql://{user}:{enc}@{host}:{port}/{db}?sslmode=disable"
              with open("/work/database_url", "w") as f:
                  f.write(url)
          env:
            - name: PGUSER
              value: postgres
            - name: PGHOST
              value: postgresql.postgresql
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: windmill
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: windmill-database-password
          image: python:3-alpine
          imagePullPolicy: IfNotPresent
          name: build-database-url
          volumeMounts:
            - mountPath: /work
              name: windmill-db-url-work
      nodeSelector:
        kubernetes.io/hostname: edgenix
      serviceAccountName: default
      volumes:
        - emptyDir: {}
          name: windmill-db-url-work
