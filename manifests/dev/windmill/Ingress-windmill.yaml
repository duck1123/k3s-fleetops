apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windmill
  namespace: windmill
spec:
  ingressClassName: tailscale
  rules:
    - host: windmill.bearded-snake.ts.net
      http:
        paths:
          - backend:
              service:
                name: windmill
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - windmill.bearded-snake.ts.net
