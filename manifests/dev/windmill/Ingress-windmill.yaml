apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windmill
  namespace: windmill
spec:
  ingressClassName: traefik
  rules:
    - host: windmill.home.kronkltd.net
      http:
        paths:
          - backend:
              service:
                name: windmill
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - windmill.home.kronkltd.net
